[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"

[etherscan]
arc_testnet = { key = "unused", url = "https://testnet.arcscan.app/api/", chain = 5042002 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
